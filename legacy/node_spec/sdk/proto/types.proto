// Foundry Flow: Shared Type Definitions
// Version: 1.0.0
// Status: Implementation Contract

syntax = "proto3";

package foundry.v1;

option go_package = "github.com/gideas/foundry/api/v1;foundryv1";

import "google/protobuf/timestamp.proto";

// =============================================================================
// COMMON TYPES
// =============================================================================

message Empty {}

// =============================================================================
// ARTEFACT TYPES
// =============================================================================

message ArtefactRef {
    string kind = 1;                          // GovernedArtefact kind
    string name = 2;                          // Filename
    string latest_version = 3;                // SHA256 hash of latest version
    repeated ArtefactVersion versions = 4;    // Version history
    repeated Stamp passport = 5;              // Stamps on latest version
}

message ArtefactVersion {
    string hash = 1;                          // SHA256 content hash
    google.protobuf.Timestamp created_at = 2; // Creation timestamp
    string created_by_node = 3;               // Node that created this version
}

message Stamp {
    string role = 1;                          // Primary key - role being asserted
    StampType type = 2;                       // "inspection" or "approval"
    string node = 3;                          // Node name (for audit)
    google.protobuf.Timestamp timestamp = 4;  // When stamped
    string hash = 5;                          // Content hash at stamp time
    bytes signature = 6;                      // RSA signature
    repeated string certificate_chain = 7;   // PEM-encoded: [node, operator, state_root]
    repeated LawCitation laws = 8;            // Present for "approval" type
}

enum StampType {
    STAMP_TYPE_UNSPECIFIED = 0;
    STAMP_TYPE_INSPECTION = 1;                // Review marker - lightweight check
    STAMP_TYPE_APPROVAL = 2;                  // Governance certification - requires laws
}

message LawCitation {
    string id = 1;                            // Law ID (e.g., "f-109")
    string version = 2;                       // Law version at citation time
}

// =============================================================================
// FEEDBACK TYPES
// =============================================================================

message FeedbackItem {
    string id = 1;                            // Feedback ID (e.g., "fb-101")
    string target = 2;                        // Artefact kind being critiqued
    string source = 3;                        // Node that created feedback
    Severity severity = 4;                    // Issue severity
    FeedbackState state = 5;                  // Current state
    string message = 6;                       // Feedback content
    string linked_ruling = 7;                 // Ruling ID if rejected by Assay
    repeated FeedbackEvent history = 8;       // Event history
    Justification justification = 9;          // If wont-fix
}

enum Severity {
    SEVERITY_UNSPECIFIED = 0;
    SEVERITY_LOW = 1;
    SEVERITY_MEDIUM = 2;
    SEVERITY_HIGH = 3;
    SEVERITY_CRITICAL = 4;
}

enum FeedbackState {
    FEEDBACK_STATE_UNSPECIFIED = 0;
    FEEDBACK_STATE_PENDING = 1;
    FEEDBACK_STATE_ACTIONED = 2;
    FEEDBACK_STATE_WONT_FIX = 3;
    FEEDBACK_STATE_DISPUTED = 4;
    FEEDBACK_STATE_REJECTED = 5;
    FEEDBACK_STATE_RESOLVED = 6;
}

message FeedbackEvent {
    google.protobuf.Timestamp timestamp = 1;
    string author = 2;                        // Node name
    string role = 3;                          // Node role at time of event
    FeedbackAction action = 4;
    string message = 5;
}

enum FeedbackAction {
    FEEDBACK_ACTION_UNSPECIFIED = 0;
    FEEDBACK_ACTION_OPENED = 1;
    FEEDBACK_ACTION_FIXED = 2;
    FEEDBACK_ACTION_REJECTED = 3;
    FEEDBACK_ACTION_WONT_FIX = 4;
    FEEDBACK_ACTION_ESCALATED = 5;
    FEEDBACK_ACTION_RESOLVED = 6;
}

message Justification {
    JustificationType type = 1;
    repeated string citation_ids = 2;         // If type=CITATION
    string argument = 3;                      // If type=NOVEL_ARGUMENT
}

enum JustificationType {
    JUSTIFICATION_TYPE_UNSPECIFIED = 0;
    JUSTIFICATION_TYPE_CITATION = 1;
    JUSTIFICATION_TYPE_NOVEL_ARGUMENT = 2;
}

// =============================================================================
// LAW TYPES
// =============================================================================

message Law {
    string id = 1;                            // Law ID (e.g., "f-109-use-f-strings")
    int32 tier = 2;                           // 1=Finding, 2=Ruling, 3=Statute, 4=Federal
    string statement = 3;                     // Natural language rule
    map<string, string> labels = 4;           // Metadata labels
    google.protobuf.Timestamp expires_at = 5; // Expiration timestamp
    int64 citation_count = 6;                 // Total citations
    google.protobuf.Timestamp created_at = 7;
    string created_by = 8;                    // Node that created (for Findings)
    string superseded_by = 9;                 // If retired, the replacing law
}

// =============================================================================
// WORKITEM TYPES
// =============================================================================

message Workitem {
    string id = 1;
    string type = 2;                          // WorkitemType name
    string intent = 3;                        // Human-readable purpose
    Priority priority = 4;
    WorkitemState state = 5;
    string current_assignee = 6;              // Node currently processing
    string previous_assignee = 7;             // Previous node
    repeated ArtefactRef artefacts = 8;
    repeated FeedbackItem feedback = 9;
    map<string, string> context = 10;         // Application context
    google.protobuf.Timestamp created_at = 11;
    google.protobuf.Timestamp updated_at = 12;
    string failure_reason = 13;               // If state=FAILED
}

enum Priority {
    PRIORITY_UNSPECIFIED = 0;
    PRIORITY_LOW = 1;
    PRIORITY_MEDIUM = 2;
    PRIORITY_HIGH = 3;
    PRIORITY_CRITICAL = 4;
}

enum WorkitemState {
    WORKITEM_STATE_UNSPECIFIED = 0;
    WORKITEM_STATE_PENDING = 1;
    WORKITEM_STATE_RUNNING = 2;
    WORKITEM_STATE_COMPLETED = 3;
    WORKITEM_STATE_FAILED = 4;
}

// =============================================================================
// TELEMETRY TYPES
// =============================================================================

message TelemetryEvent {
    string type = 1;                          // Event type (e.g., "foundry.workitem.completed")
    google.protobuf.Timestamp timestamp = 2;
    string flow_id = 3;                       // Flow identifier
    string trace_id = 4;                      // Distributed trace ID
    map<string, string> context = 5;          // Event context (e.g., workitem_id)
    bytes payload = 6;                        // JSON-encoded payload
}

message FrictionReport {
    double value = 1;                         // Friction magnitude
    FrictionOperation operation = 2;          // Aggregation operation
    string reason = 3;                        // Human-readable explanation
    string attribution = 4;                   // "node-logic" | "external-api" | "infrastructure"
    map<string, string> tags = 5;             // Arbitrary dimensions
}

enum FrictionOperation {
    FRICTION_OPERATION_UNSPECIFIED = 0;
    FRICTION_OPERATION_LOG = 1;               // Score += log(1 + value)
    FRICTION_OPERATION_ADD = 2;               // Score += value
    FRICTION_OPERATION_MULTIPLY = 3;          // Score *= value
    FRICTION_OPERATION_SET = 4;               // Score = value
}

// =============================================================================
// VALIDATION TYPES
// =============================================================================

message ValidationResult {
    bool valid = 1;
    repeated string missing_roles = 2;        // Roles required but not stamped
}
