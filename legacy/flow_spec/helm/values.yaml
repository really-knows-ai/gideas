# =============================================================================
# FOUNDRY FLOW HELM CHART - DEFAULT VALUES
# =============================================================================
# This file documents all configurable parameters for the Foundry Flow chart.
# Override these values in your release-specific values file or via --set flags.
#
# Example:
#   helm install flow-ideate ./foundry-flow \
#     --namespace flow-ideate \
#     --set global.imageRegistry=internal.corp.com/foundry \
#     --set operator.resources.limits.memory=1Gi
# =============================================================================

# -----------------------------------------------------------------------------
# GLOBAL SETTINGS
# -----------------------------------------------------------------------------
global:
  # Image registry prefix for all Foundry images.
  # Override for air-gapped/enterprise environments.
  imageRegistry: "ghcr.io/gideas"
  
  # Image pull policy for all containers.
  # Options: Always, IfNotPresent, Never
  imagePullPolicy: IfNotPresent
  
  # Image pull secrets (for private registries)
  imagePullSecrets: []
  # - name: my-registry-secret
  
  # Kubernetes namespace (usually set via --namespace flag)
  # The chart enforces: one namespace = one Flow
  namespace: ""

# -----------------------------------------------------------------------------
# FLOW OPERATOR
# -----------------------------------------------------------------------------
operator:
  # Container image
  image:
    repository: flow-operator
    tag: "v1.0.0"
  
  # Replica count (typically 1 for leader-elected operator)
  replicas: 1
  
  # Resource limits
  # The Operator reconciles CRDs and manages routing. Memory scales with
  # active Workitem count. CPU spikes during burst routing.
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  
  # Log level: debug, info, warn, error
  logLevel: info
  
  # Reconciliation settings
  reconcile:
    # How often to re-sync all CRDs even without changes (drift detection)
    resyncPeriod: "30m"
    # Maximum concurrent reconcile workers
    maxConcurrentReconciles: 10
  
  # Health probe configuration
  probes:
    liveness:
      path: /healthz/liveness
      port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
    readiness:
      path: /healthz/readiness
      port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
    startup:
      path: /healthz/startup
      port: 8080
      failureThreshold: 30
      periodSeconds: 10

# -----------------------------------------------------------------------------
# GOVERNANCE PARAMETERS (FoundryFlow CRD defaults)
# -----------------------------------------------------------------------------
governance:
  # Populus Threshold: Citation count required to promote Tier 1 → Tier 2
  # Higher = more consensus needed before a Finding becomes a Ruling
  populusThreshold: 50
  
  # Default Finding Decay: How long Tier 1 Findings live before expiring
  # Findings not cited within this window trigger ReviewHearing
  defaultFindingDecay: "30d"
  
  # Tier 2 Ruling default expiry (can be extended via SustainRuling)
  defaultRulingExpiry: "90d"
  
  # Conflict detection threshold for semantic similarity
  # Laws with similarity > this value trigger CONFLICT_DETECTED
  conflictThreshold: 0.85

# -----------------------------------------------------------------------------
# LIVING LAW: UNIFIED REVIEW LOOP
# -----------------------------------------------------------------------------
livingLaw:
  # Review Window: How far before expiry to trigger ReviewHearing
  # e.g., "72h" means 3 days before expiresAt, create hearing
  reviewWindow: "72h"
  
  # Citation thresholds for promotion hearings
  citationThreshold:
    # Tier 1 → Tier 2: Citations required to trigger promotion review
    tier1ToTier2: 50
    # Tier 2 → Tier 3: Citations required to trigger statute proposal
    tier2ToTier3: 200
  
  # Scanner intervals
  scanner:
    # How often to scan for expiring laws
    expiryInterval: "1h"
    # Citation threshold checks happen on each citation (no interval)


# -----------------------------------------------------------------------------
# WORKITEM EXECUTION LIMITS (The "Magic Numbers")
# -----------------------------------------------------------------------------
execution:
  # Standard Node Timeout: Default INACTIVITY deadline for workitems
  # This is an idle timeout, not a max duration. Active nodes (heartbeating)
  # will never timeout regardless of total execution time.
  # Nodes can override via FoundryNode.spec.timeout
  standardNodeTimeout: "30s"
  
  # Maximum Node Timeout: Upper bound on FoundryNode.spec.timeout
  # Prevents operators from setting absurdly long inactivity windows
  maxNodeTimeout: "300s"
  
  # Thrash Guard: Maximum visits per node before failing the workitem
  # This is an INFRASTRUCTURE guard, not semantic. 30 visits = infinite loop.
  maxVisits: 30
  
  # Default concurrency per node pod
  # 0 = unlimited (typical for HITL nodes)
  defaultConcurrency: 1
  
  # Grace period multiplier for pod termination
  # terminationGracePeriodSeconds = graceMultiplier × timeout
  graceMultiplier: 2

# -----------------------------------------------------------------------------
# RETENTION & CLEANUP (etcd Hygiene)
# -----------------------------------------------------------------------------
retention:
  # Workitem TTL: How long to keep completed/failed workitems
  # After this period, the Operator garbage-collects the CRD
  workitemTTL: "30d"
  
  # Artefact version retention
  artefacts:
    # Maximum versions to keep per artefact (latest always preserved)
    maxVersions: 10
    # Delete versions older than this (latest always preserved)
    maxAge: "7d"
  
  # Law retention
  laws:
    # Tier 1 Findings: expire after defaultFindingDecay (see governance)
    # Tier 2 Rulings: expire after defaultRulingExpiry unless sustained
    # Tier 3/4: permanent until explicitly retired

# -----------------------------------------------------------------------------
# SYSTEM SERVICES: THE ARCHIVIST
# -----------------------------------------------------------------------------
archivist:
  # Container image
  image:
    repository: archivist
    tag: "v1.0.0"
  
  # Resource limits
  # Archivist is I/O bound. Memory for in-memory Hot Tier cache.
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  
  # Storage backend configuration
  storage:
    # Backend type: "filesystem" (PVC) or "blobstore" (S3/GCS/Azure)
    backend: "filesystem"
    
    # Filesystem backend configuration (used when backend: "filesystem")
    filesystem:
      # Storage class (leave empty for cluster default)
      storageClass: ""
      # PVC size - scales with artefact volume
      size: "10Gi"
      # Access mode
      accessMode: ReadWriteOnce
      # Mount path inside container
      mountPath: "/data"
    
    # Blobstore backend configuration (used when backend: "blobstore")
    blobstore:
      # Provider: "s3", "gcs", "azure", "minio"
      provider: "s3"
      # Bucket name
      bucket: "foundry-artefacts"
      # Region (provider-specific)
      region: "us-east-1"
      # Endpoint override (for MinIO or custom S3-compatible)
      endpoint: ""
      # Path prefix within bucket
      prefix: "artefacts/"
      # Authentication: Uses K8s ServiceAccount annotations
      # - AWS: IRSA (IAM Roles for Service Accounts)
      # - GCP: Workload Identity
      # - Azure: Pod Identity
      # No explicit credentials in values - managed via K8s RBAC
  
  # Hot Tier: in-memory cache for small artefacts
  # Provides strong read-after-write consistency regardless of backend
  hotTier:
    # Maximum size of artefacts to cache in memory
    maxObjectSize: "1Mi"
    # Total hot tier cache size
    cacheSize: "256Mi"
    # TTL for cached objects (0 = LRU eviction only)
    ttl: "5m"
  
  # Pruning loop interval
  pruneInterval: "1h"
  
  # gRPC server port (internal, system services only)
  port: 35698
  
  # Health probes
  probes:
    liveness:
      path: /healthz/liveness
      port: 8080
      initialDelaySeconds: 10
      periodSeconds: 30
    readiness:
      path: /healthz/readiness
      port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10

# -----------------------------------------------------------------------------
# SYSTEM SERVICES: THE LIBRARIAN
# -----------------------------------------------------------------------------
librarian:
  # Container image
  image:
    repository: librarian
    tag: "v1.0.0"
  
  # Resource limits
  # Librarian runs sqlite-vec. Memory scales with law corpus size.
  # Vector operations are CPU-intensive during conflict detection.
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  
  # SQLite database storage
  storage:
    storageClass: ""
    size: "5Gi"
    accessMode: ReadWriteOnce
  
  # Cold snapshot export interval
  snapshotInterval: "60m"
  
  # gRPC server port
  port: 35698
  
  # Health probes
  probes:
    liveness:
      path: /healthz/liveness
      port: 8080
      initialDelaySeconds: 10
      periodSeconds: 30
    readiness:
      path: /healthz/readiness
      port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10

# -----------------------------------------------------------------------------
# SYSTEM SERVICES: LAW SEARCH
# -----------------------------------------------------------------------------
lawSearch:
  # Container image
  image:
    repository: law-search
    tag: "v1.0.0"
  
  # Replica count
  # PRODUCTION: Run 2+ replicas for availability during rolling updates
  # DEVELOPMENT: 1 replica acceptable (will have downtime on restart)
  replicas: 2
  
  # Resource limits
  # Law Search is read-heavy. Memory scales with law corpus size.
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  
  # Catch-up timeout: max time to wait during boot catch-up
  # If exceeded, pod stays NOT_SERVING (monitor alert threshold)
  catchUpTimeout: "5m"
  
  # gRPC server port
  port: 35698
  
  # Health probes
  probes:
    liveness:
      path: /healthz/liveness
      port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
    readiness:
      path: /healthz/readiness
      port: 8080
      initialDelaySeconds: 10
      periodSeconds: 5

# -----------------------------------------------------------------------------
# SYSTEM SERVICES: TELEMETRY ROUTER
# -----------------------------------------------------------------------------
telemetryRouter:
  # Container image
  image:
    repository: telemetry-router
    tag: "v1.0.0"
  
  # Resource limits
  # Telemetry Router is memory-bound (event buffer)
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"
  
  # Event buffer size (in-memory before flush)
  bufferSize: 10000
  
  # Flush interval to external sinks
  flushInterval: "10s"
  
  # gRPC server port
  port: 35698

# -----------------------------------------------------------------------------
# SYSTEM SERVICES: FLOW MONITOR
# -----------------------------------------------------------------------------
flowMonitor:
  # Container image
  image:
    repository: flow-monitor
    tag: "v1.0.0"
  
  # Resource limits
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  
  # Friction calculation parameters
  friction:
    # Time window for friction aggregation
    window: "1h"
    # Decay half-life for friction scores
    decayHalfLife: "24h"
  
  # SQLite storage for friction ledger
  storage:
    storageClass: ""
    size: "1Gi"
    accessMode: ReadWriteOnce

# -----------------------------------------------------------------------------
# EMBEDDING CONFIGURATION
# -----------------------------------------------------------------------------
embedding:
  # Provider: ollama, openai, azure, anthropic
  provider: "ollama"
  
  # Provider endpoint (for ollama/azure)
  endpoint: "http://ollama:11434"
  
  # Model name (provider-specific)
  model: "nomic-embed-text"
  
  # Embedding dimensions (must match model output)
  dimensions: 768
  
  # Batch size for bulk embedding operations
  batchSize: 100
  
  # API key secret reference (for openai/azure/anthropic)
  # Leave empty for ollama (no auth required)
  apiKeySecret:
    name: ""
    key: ""

# -----------------------------------------------------------------------------
# SIDECAR CONFIGURATION (Injected into all FoundryNode pods)
# -----------------------------------------------------------------------------
sidecar:
  # Container image
  image:
    repository: sidecar
    tag: "v1.0.0"
  
  # Resource limits
  # Sidecar handles all gRPC traffic for the node
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
  
  # gRPC server port (node → sidecar communication)
  port: 50051
  
  # Metrics port (Prometheus scrape target)
  metricsPort: 9090

# -----------------------------------------------------------------------------
# SECURITY & AUTHENTICATION
# -----------------------------------------------------------------------------
security:
  # v1 Atomic Mode: ServiceAccount token authentication
  # v2 Federated Mode: mTLS certificates from Governor (future)
  authMode: "serviceaccount"
  
  # Required kernel layer hash for node image validation
  # The Operator verifies all FoundryNode images inherit from this base
  requiredKernelLayer: ""
  # Example: "sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
  
  # Pod security context defaults
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  
  # Container security context defaults
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  
  # ---------------------------------------------------------------------------
  # TREATIES (Cross-Flow Collaboration)
  # ---------------------------------------------------------------------------
  # Treaties enable Atomic Flows to collaborate without full Federation.
  # A Treaty is a RECEIVER-SIDE configuration - it grants import permission
  # to a specific foreign Flow. Treaties are unilateral: A trusts B ≠ B trusts A.
  #
  # See: flow_spec/14_cross_flow_collaboration.md
  treaties: []
  # Example treaty configuration:
  # treaties:
  #   - name: "vendor-flow-alpha"
  #     # PEM-encoded CA certificate of the foreign Operator
  #     caCert: |
  #       -----BEGIN CERTIFICATE-----
  #       MIIFazCCA1OgAwIBAgIUZ...
  #       -----END CERTIFICATE-----
  #     # Which node CNs (Common Names) are allowed to sign export bundles
  #     allowedSubjects:
  #       - "export-node"
  #       - "terminal-exporter"
  #     # Optional: restrict to specific workitem types (empty = all allowed)
  #     allowedWorkitemTypes:
  #       - "vendor-submission-v1"
  #     # Optional: reject bundles larger than this size
  #     maxBundleSize: "50Mi"
  #
  #   - name: "partner-flow-beta"
  #     caCert: |
  #       -----BEGIN CERTIFICATE-----
  #       MIIFazCCA1OgAwIBAgIUX...
  #       -----END CERTIFICATE-----
  #     allowedSubjects:
  #       - "export-terminal"

# -----------------------------------------------------------------------------
# EMBASSY NODE DEFAULTS (Cross-Flow I/O)
# -----------------------------------------------------------------------------
# Embassy Nodes are optimized for cross-flow Export/Import operations.
# They use disk buffering via the "Diplomatic Pouch" to handle large bundles.
embassy:
  # Diplomatic Pouch volume configuration
  pouch:
    # Mount path for the scratch volume (shared between Node and Sidecar)
    mountPath: "/var/run/foundry/pouch"
    # Default size limit for emptyDir volume
    sizeLimit: "10Gi"
  
  # Resource presets for Embassy Nodes (high disk I/O, standard memory)
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
      ephemeral-storage: "10Gi"
    limits:
      cpu: "500m"
      memory: "512Mi"
      ephemeral-storage: "20Gi"
  
  # Streaming thresholds
  streaming:
    # Bundle size threshold for switching from in-memory to disk buffering
    memoryThreshold: "100Mi"
    # Chunk size for streaming operations
    chunkSize: "1Mi"

# -----------------------------------------------------------------------------
# ASSAY NODE (JUDICIARY) DEFAULTS
# -----------------------------------------------------------------------------
assay:
  # Default timeout for jury deliberation (longer than standard nodes)
  timeout: "120s"
  
  # Default consensus strategy
  defaultConsensusStrategy: "SimpleMajority"
  
  # Maximum deliberation rounds before hung jury
  maxRounds: 3
  
  # Default jury profile (can be overridden in FoundryFlow.spec.assayPolicy)
  defaultJuryProfile:
    - name: "pragmatist"
      model: "gpt-4o"
      temperature: 0.7
    - name: "risk-assessor"
      model: "gpt-4o"
      temperature: 0.3

# -----------------------------------------------------------------------------
# OBSERVABILITY
# -----------------------------------------------------------------------------
observability:
  # Prometheus metrics
  metrics:
    enabled: true
    port: 9090
    path: /metrics
  
  # Distributed tracing (OpenTelemetry)
  tracing:
    enabled: false
    endpoint: ""
    # Options: jaeger, zipkin, otlp
    exporter: "otlp"
    sampleRate: 0.1
  
  # Structured logging
  logging:
    format: json
    level: info

# -----------------------------------------------------------------------------
# SERVICE PORTS REFERENCE
# -----------------------------------------------------------------------------
# This section documents the port assignments across the Flow.
# These are NOT configurable - they are documented for reference.
#
# | Port  | Service                          | Access         |
# |-------|----------------------------------|----------------|
# | 35698 | System Services gRPC (internal)  | Sidecars only  |
# | 50051 | Node ↔ Sidecar gRPC              | Localhost only |
# | 8080  | Health/Admin HTTP                | Internal       |
# | 9090  | Prometheus Metrics               | Internal       |
# -----------------------------------------------------------------------------
