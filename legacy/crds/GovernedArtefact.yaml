apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: governedartefacts.flow.gideas.io
spec:
  group: flow.gideas.io
  scope: Namespaced
  names:
    plural: governedartefacts
    singular: governedartefact
    kind: GovernedArtefact
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                kind:
                  type: string
                validityConditions:
                  type: array
                  items:
                    type: string
                retention:
                  type: object
                  properties:
                    maxVersions:
                      type: integer
                    maxAge:
                      type: string
              required:
                - kind
