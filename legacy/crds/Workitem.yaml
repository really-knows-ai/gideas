apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workitems.flow.gideas.io
spec:
  group: flow.gideas.io
  scope: Namespaced
  names:
    plural: workitems
    singular: workitem
    kind: Workitem
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                type:
                  type: string
                context:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                state:
                  type: string
                assignedTo:
                  type: string
                visits:
                  type: integer
