apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: laws.flow.gideas.io
spec:
  group: flow.gideas.io
  scope: Namespaced
  names:
    plural: laws
    singular: law
    kind: Law
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [type, content, tier]
              properties:
                type:
                  type: string
                  description: MIME-type of content (e.g., text/markdown, application/smt-lib, application/python)
                  pattern: '^[a-z]+/[a-z0-9\-\.\+]+$'
                content:
                  type: string
                  description: The actual payload/code
                  minLength: 1
                group:
                  type: string
                  description: Optional grouping ID to link Spirit (text) and Letter (code) laws
                  pattern: '^lg-[a-z0-9]+$'
                  maxLength: 128
                tier:
                  type: integer
                  enum: [1, 2, 3, 4]
                  description: Law tier (1=Finding, 2=Ruling, 3=Statute, 4=Federal)
                appliesTo:
                  type: string
                  description: Target context (e.g., python, typescript). Empty = global law
                  maxLength: 64
            metadata:
              type: object
              properties:
                labels:
                  type: object
                  description: Labels are auto-synced from spec by the Operator. Do not modify manually.
                  additionalProperties:
                    type: string
                  properties:
                    flow.gideas.io/tier:
                      type: string
                    flow.gideas.io/applies-to:
                      type: string
                    flow.gideas.io/group:
                      type: string
                    flow.gideas.io/type:
                      type: string
            status:
              type: object
              properties:
                citationCount:
                  type: integer
                  minimum: 0
                governanceSignal:
                  type: string
                  enum: ["None", "Weak", "Moderate", "Strong"]
                lastLeaseUpdate:
                  type: string
                  format: date-time