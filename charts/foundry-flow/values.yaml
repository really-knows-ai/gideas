# Foundry Flow — Helm Chart Values
#
# These values are used by the Helm chart templates to deploy the control-plane
# infrastructure alongside a Foundry Flow instance.

# -- Event Bus configuration
eventbus:
  image: ghcr.io/gideas/flow/eventbus:latest
  port: 50056
  dbPath: /data/eventbus.db
  storage:
    size: 1Gi
  retention:
    telemetry:
      duration: ""
      size: ""
    audit:
      duration: ""
      size: ""
    friction:
      duration: ""
      size: ""
    workitem:
      duration: ""
      size: ""

# -- Friction Ledger configuration
frictionledger:
  image: ghcr.io/gideas/flow/frictionledger:latest
  port: 50057
  dbPath: /data/frictionledger.db
  storage:
    size: 1Gi
  # Per-tier friction thresholds (float64 strings, e.g. "100.0").
  # Empty means no threshold configured for that tier.
  thresholds:
    tier1: ""
    tier2: ""
    tier3: ""
    tier4: ""
    tier5: ""

# -- Flow Monitor configuration
monitor:
  image: ghcr.io/gideas/flow/monitor:latest
  port: 2112
  checkpointPath: /data/monitor-checkpoint.json
  storage:
    size: 100Mi

# -- Librarian configuration
librarian:
  image: ghcr.io/gideas/flow/librarian:latest
  port: 50058
  dbPath: /data/librarian.db
  storage:
    size: 1Gi
  reviewTTLs:
    tier1: ""
    tier2: ""
    tier3: ""
    tier4: ""
    tier5: ""

# -- Sidecar configuration (injected into node pods by the Operator)
sidecar:
  image: ghcr.io/gideas/flow/sidecar:latest

# -- Operator configuration
operator:
  serviceName: flow-operator
  port: 50052
