# Flow Monitor — Deployment, Service, PVC
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-monitor-data
  labels:
    {{- include "foundry-flow.labels" . | nindent 4 }}
    {{- include "foundry-flow.selectorLabels" "monitor" | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.monitor.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-monitor
  labels:
    {{- include "foundry-flow.labels" . | nindent 4 }}
    {{- include "foundry-flow.selectorLabels" "monitor" | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "foundry-flow.selectorLabels" "monitor" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "foundry-flow.selectorLabels" "monitor" | nindent 8 }}
    spec:
      containers:
        - name: monitor
          image: {{ .Values.monitor.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http-metrics
              containerPort: {{ .Values.monitor.port }}
              protocol: TCP
          env:
            - name: FLOW_MONITOR_PORT
              value: {{ .Values.monitor.port | quote }}
            - name: FLOW_MONITOR_CHECKPOINT_PATH
              value: {{ .Values.monitor.checkpointPath | quote }}
            - name: EVENT_BUS_ADDRESS
              value: {{ include "foundry-flow.eventBusAddress" . | quote }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-monitor-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-monitor
  labels:
    {{- include "foundry-flow.labels" . | nindent 4 }}
    {{- include "foundry-flow.selectorLabels" "monitor" | nindent 4 }}
spec:
  selector:
    {{- include "foundry-flow.selectorLabels" "monitor" | nindent 4 }}
  ports:
    - name: http-metrics
      port: {{ .Values.monitor.port }}
      targetPort: {{ .Values.monitor.port }}
      protocol: TCP
  type: ClusterIP
