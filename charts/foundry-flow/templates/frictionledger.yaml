# Friction Ledger — Deployment, Service, PVC
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-frictionledger-data
  labels:
    {{- include "foundry-flow.labels" . | nindent 4 }}
    {{- include "foundry-flow.selectorLabels" "frictionledger" | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.frictionledger.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frictionledger
  labels:
    {{- include "foundry-flow.labels" . | nindent 4 }}
    {{- include "foundry-flow.selectorLabels" "frictionledger" | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "foundry-flow.selectorLabels" "frictionledger" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "foundry-flow.selectorLabels" "frictionledger" | nindent 8 }}
    spec:
      containers:
        - name: frictionledger
          image: {{ .Values.frictionledger.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: {{ .Values.frictionledger.port }}
              protocol: TCP
          env:
            - name: FRICTION_LEDGER_PORT
              value: {{ .Values.frictionledger.port | quote }}
            - name: FRICTION_LEDGER_DB_PATH
              value: {{ .Values.frictionledger.dbPath | quote }}
            - name: EVENT_BUS_ADDRESS
              value: {{ include "foundry-flow.eventBusAddress" . | quote }}
            {{- with .Values.frictionledger.thresholds.tier1 }}
            - name: FRICTION_THRESHOLD_TIER1
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.frictionledger.thresholds.tier2 }}
            - name: FRICTION_THRESHOLD_TIER2
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.frictionledger.thresholds.tier3 }}
            - name: FRICTION_THRESHOLD_TIER3
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.frictionledger.thresholds.tier4 }}
            - name: FRICTION_THRESHOLD_TIER4
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.frictionledger.thresholds.tier5 }}
            - name: FRICTION_THRESHOLD_TIER5
              value: {{ . | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-frictionledger-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frictionledger
  labels:
    {{- include "foundry-flow.labels" . | nindent 4 }}
    {{- include "foundry-flow.selectorLabels" "frictionledger" | nindent 4 }}
spec:
  selector:
    {{- include "foundry-flow.selectorLabels" "frictionledger" | nindent 4 }}
  ports:
    - name: grpc
      port: {{ .Values.frictionledger.port }}
      targetPort: {{ .Values.frictionledger.port }}
      protocol: TCP
  type: ClusterIP
