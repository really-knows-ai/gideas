syntax = "proto3";

package flow.v1;

option go_package = "github.com/gideas/flow/proto/flow/v1;flowv1";

import "flow/v1/common.proto";

// SidecarService is the internal pod proxy for node-to-runtime communication.
// The Sidecar authenticates, injects identity context, and proxies to the
// owning service. Nodes see SDK calls; the Sidecar handles transport.
//
// The Sidecar also acts as the proxy for all other services (Operator,
// Archivist, Librarian, FrictionLedger) when called from the Node. Those
// service definitions are not duplicated here -- the Go SDK will connect
// to the Sidecar's port and use the respective service stubs.
//
// See: specs/05-reference/grpc-api.md#sidecar-mediated-sdk-paths
service SidecarService {
  // Resets the Sidecar's inactivity timer. Implicit heartbeats occur on
  // every SDK call; this method provides an explicit signal for long-running
  // computation. The Sidecar propagates activity timestamps to the Operator,
  // throttled to avoid excessive writes.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Suspends the Sidecar's inactivity timer for the specified Workitem
  // assignment. The timer remains suspended until ResumeTimer is called or
  // the handler returns. Used by HITL nodes to park Workitems while awaiting
  // external input without triggering timeout. The Workitem remains in
  // Running state -- this is a Sidecar-local mechanism.
  // See: specs/04-sdk/08-sdk-hitl.md
  rpc PauseTimer(PauseTimerRequest) returns (PauseTimerResponse);

  // Resumes the Sidecar's inactivity timer after a PauseTimer call. The
  // timer resets to the full timeout window on resume.
  rpc ResumeTimer(ResumeTimerRequest) returns (ResumeTimerResponse);

  // Called by the Operator to push a work assignment to this specific
  // Sidecar/Pod. The Sidecar validates the request and forwards it to
  // the co-located User Code container via the NodeService.Process RPC.
  rpc AssignWork(AssignWorkRequest) returns (Ack);

  // Records a friction event. The Sidecar injects identity fields from the
  // active session, enforces the WRITE:friction capability gate, wraps the
  // event in a FlowEvent envelope, and publishes to the Event Bus telemetry
  // channel. The SDK never builds FlowEvent messages directly.
  // See: specs/04-sdk/06-sdk-telemetry.md
  rpc AddFriction(AddFrictionRequest) returns (AddFrictionResponse);

  // Records a custom telemetry event. The Sidecar injects identity fields,
  // wraps the event in a standard FlowEvent envelope with timestamp and
  // trace context, and publishes to the Event Bus telemetry channel.
  // Payload is JSON-serializable, max 64 KB.
  rpc RecordTelemetry(RecordTelemetryRequest) returns (RecordTelemetryResponse);
}

message HeartbeatRequest {
  string workitem_id = 1;
}

message HeartbeatResponse {
  bool acknowledged = 1;
}

message PauseTimerRequest {
  string workitem_id = 1;
}

message PauseTimerResponse {
  bool acknowledged = 1;
}

message ResumeTimerRequest {
  string workitem_id = 1;
}

message ResumeTimerResponse {
  bool acknowledged = 1;
}

// AssignWorkRequest is sent by the Operator to push a Workitem assignment
// to a specific Sidecar instance.
message AssignWorkRequest {
  // The identity context for this assignment (flow, workitem, node).
  WorkitemContext context = 1;
}

// Ack is a generic acknowledgement response.
message Ack {
  bool accepted = 1;
  string message = 2;
}

// --- Ingestion types (migrated from monitor.proto) ---

message AddFrictionRequest {
  // Kubernetes namespace that owns this flow (one namespace = one FoundryFlow).
  string flow_namespace = 1;
  string workitem_id = 2;
  // Optional: Sidecar-injected for node context.
  string node_id = 3;
  // Optional: law identifiers associated with this friction event.
  repeated string law_ids = 4;
  // Friction magnitude.
  int32 magnitude = 5;
}

message AddFrictionResponse {
  bool acknowledged = 1;
}

message RecordTelemetryRequest {
  // Kubernetes namespace that owns this flow (one namespace = one FoundryFlow).
  string flow_namespace = 1;
  string node_id = 2;
  string workitem_id = 3;
  // Event type identifier.
  string event_type = 4;
  // JSON-serialized payload, max 64 KB.
  bytes payload = 5;
}

message RecordTelemetryResponse {
  bool acknowledged = 1;
}
