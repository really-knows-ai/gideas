syntax = "proto3";

package flow.v1;

option go_package = "github.com/gideas/flow/proto/flow/v1;flowv1";

import "google/protobuf/timestamp.proto";

// --- Messages ---

// A key-value pair used for server-side event filtering. Events carry
// repeated labels (allowing multi-valued keys, e.g. law_id=law-1 and
// law_id=law-2). Subscribers filter with AND semantics: every label in
// the filter must match at least one label on the event.
message Label {
  string key = 1;
  string value = 2;
}

// A durable event published to the Flow Event Bus.
// See: specs/05-reference/grpc-api.md#flowevent
message FlowEvent {
  // Unique event identifier (assigned by publisher).
  string event_id = 1;

  // Monotonic per-channel sequence number (assigned by the Event Bus).
  uint64 sequence = 2;

  // Channel this event belongs to (e.g. "telemetry", "audit",
  // "friction", "workitem"). Free-form string; the Event Bus is
  // channel-agnostic.
  string channel = 3;

  // Discriminator for the event payload (e.g. "friction",
  // "friction.threshold_crossed", "audit.artefact.version_created").
  string event_type = 4;

  // Kubernetes namespace that owns this flow (one namespace = one FoundryFlow).
  string flow_namespace = 5;
  string node_id = 6;
  string workitem_id = 7;

  // When the event was created.
  google.protobuf.Timestamp timestamp = 8;

  // Distributed trace identifier for correlation.
  string trace_id = 9;

  // Arbitrary key-value metadata not used for filtering (e.g. magnitude,
  // threshold, accumulated_friction).
  map<string, string> attributes = 10;

  // Optional binary payload (max 64 KB).
  bytes payload = 11;

  // Field 12 removed (parent_workitem_id moved to labels).
  reserved 12;

  // Repeated labels for server-side filtering. Filtering-relevant
  // dimensions (e.g. law_id, parent_workitem_id, phase) go here.
  repeated Label labels = 13;
}

// --- Request / Response ---

// Publish a single event to the Event Bus.
message PublishRequest {
  // Channel to publish to (e.g. "telemetry", "audit").
  string channel = 1;
  FlowEvent event = 2;
}

// Acknowledgement with the assigned sequence number.
message PublishResponse {
  bool acknowledged = 1;
  uint64 sequence = 2;
}

// Subscribe to a channel, optionally replaying from a past sequence.
message SubscribeRequest {
  // Channel to subscribe to (e.g. "telemetry", "audit").
  string channel = 1;

  // Optional filter narrowing the event stream.
  SubscribeFilter filter = 2;

  // Resume from this sequence (0 = live-only, no replay).
  uint64 last_sequence = 3;
}

// Narrow the events delivered to a subscriber.
message SubscribeFilter {
  // Match events with this event_type (empty = all types).
  // Convenience field — equivalent to a label match but used by every
  // subscriber so it is kept as a first-class field.
  string event_type = 1;

  // Fields 2-3 removed (law_id and parent_workitem_id moved to
  // match_labels).
  reserved 2, 3;

  // AND-match labels: every label in match_labels must have at least one
  // matching label on the event.
  repeated Label match_labels = 4;
}

// --- Service ---

// FlowEventBusService is the durable pub/sub bus for all Flow runtime
// events. Events are persisted to SQLite before fan-out. Retention is
// per-channel and operator-configurable.
// See: specs/02-flow/04-system-services.md (Service Invariant #13)
service FlowEventBusService {
  // Publish persists an event and fans it out to active subscribers.
  rpc Publish(PublishRequest) returns (PublishResponse);

  // Subscribe opens a server-side stream. If last_sequence > 0 the Bus
  // replays stored events first, then switches to live delivery.
  rpc Subscribe(SubscribeRequest) returns (stream FlowEvent);
}
