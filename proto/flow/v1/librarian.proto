syntax = "proto3";

package flow.v1;

option go_package = "github.com/gideas/flow/proto/flow/v1;flowv1";

import "flow/v1/common.proto";
import "google/protobuf/timestamp.proto";

// LibrarianService manages the Flow's body of law.
// Node-facing methods are reached through the Sidecar.
// See: specs/05-reference/grpc-api.md#librarian-api
service LibrarianService {
  // --- Node-Facing Methods (via Sidecar) ---

  // Returns laws matching the filter. Three query modes:
  // (1) no filter - all laws
  // (2) governed_artefact - laws whose appliesTo includes the governed artefact name, plus global laws
  // (3) governed_artefact + representation_type - governed artefact filter plus representation type
  rpc QueryLaws(QueryLawsRequest) returns (QueryLawsResponse);

  // Records law usage. The Sidecar wraps this as an AddFriction call
  // with fixed citation magnitude and the specified law identifiers.
  rpc Cite(CiteRequest) returns (CiteResponse);

  // Creates a Tier 1 Finding. Write-availability-first: returns immediately
  // with a law identifier. Indexing and duplicate detection are asynchronous.
  rpc RecordFinding(RecordFindingRequest) returns (RecordFindingResponse);

  // --- Service-Facing Methods ---

  // Returns the full law object by identifier.
  // Used by the Judiciary (Tribunal, Arbiter) for hearing evidence retrieval.
  rpc GetLaw(GetLawRequest) returns (GetLawResponse);

  // Persists a law (Tier 2 Ruling applied by the Judiciary Gate after petition
  // approval, Tier 3+ applied by administrator or Governance Flow).
  rpc WriteLaw(WriteLawRequest) returns (WriteLawResponse);

  // Removes a law from the active Library.
  // History is preserved in the audit log.
  rpc RetireLaw(RetireLawRequest) returns (RetireLawResponse);

  // Receives higher-tier laws from a remote Librarian for integration.
  // Triggers the two-stage conflict protocol.
  rpc ReplicateLaws(ReplicateLawsRequest) returns (ReplicateLawsResponse);

  // Applies the outcome of a review hearing (promote, retire, demote)
  // to the specified law. Called by the Operator after Tribunal hearing completion.
  rpc ApplyLifecycleAction(ApplyLifecycleActionRequest) returns (ApplyLifecycleActionResponse);

  // --- Dispute Record Methods ---

  // Creates a dispute record linking a petition to the laws it cites.
  // Called by law-applicator on the T4-5 path before routing to Embassy.
  rpc CreateDisputeRecord(CreateDisputeRecordRequest) returns (CreateDisputeRecordResponse);

  // Retires a dispute record when a petition outcome is resolved.
  // Called by the petition-outcome-watcher on acceptance or rejection.
  rpc RetireDisputeRecord(RetireDisputeRecordRequest) returns (RetireDisputeRecordResponse);

  // Returns active dispute records, optionally filtered by a cited law ID.
  // Called by Sort to check for pending disputes before deadlock routing.
  rpc GetActiveDisputes(GetActiveDisputesRequest) returns (GetActiveDisputesResponse);

  // --- Semantic Search Methods ---

  // Searches for laws semantically similar to the query text using vector
  // similarity search (sqlite-vec). Used by the Federation service for
  // distributed conflict detection during publication admission.
  rpc SearchSimilarLaws(SearchSimilarLawsRequest) returns (SearchSimilarLawsResponse);
}

// --- Node-Facing ---

message QueryLawsRequest {
  // Optional filter. Omit for all laws.
  LawFilter filter = 1;
}

message LawFilter {
  // Filter by governed artefact name.
  string governed_artefact = 1;
  // Further filter by representation MIME type.
  string representation_type = 2;
  // Filter by division. Empty means all divisions (no filtering).
  string division = 3;
}

message QueryLawsResponse {
  repeated Law laws = 1;
}

message CiteRequest {
  repeated string law_ids = 1;
}

message CiteResponse {
  bool acknowledged = 1;
}

message RecordFindingRequest {
  string goal = 1;
  repeated string applies_to = 2;
  // Optional initial representations.
  repeated Representation representations = 3;
}

message RecordFindingResponse {
  string law_id = 1;
}

// --- Service-Facing ---

message GetLawRequest {
  string law_id = 1;
}

message GetLawResponse {
  Law law = 1;
}

message WriteLawRequest {
  Law law = 1;
}

message WriteLawResponse {
  string law_id = 1;
  string version_hash = 2;
}

message RetireLawRequest {
  string law_id = 1;
}

message RetireLawResponse {
  bool acknowledged = 1;
}

message ReplicateLawsRequest {
  repeated Law laws = 1;
  // Source namespace for cross-flow law replication.
  // Identifies the Kubernetes namespace of the originating FoundryFlow.
  string source_flow_namespace = 2;
  // Optional petition ID for provenance threading. Present when the
  // replicated laws originated from a cross-flow law-petition.
  string petition_id = 3;
}

message ReplicateLawsResponse {
  repeated IntegrationResult integration_results = 1;
}

message ApplyLifecycleActionRequest {
  string law_id = 1;
  Verdict verdict = 2;
}

message ApplyLifecycleActionResponse {
  bool acknowledged = 1;
}

// --- Dispute Record Messages ---

// Status of a dispute record.
enum DisputeStatus {
  DISPUTE_STATUS_UNSPECIFIED = 0;
  DISPUTE_STATUS_ACTIVE = 1;
  DISPUTE_STATUS_RETIRED = 2;
}

// A dispute record links a cross-flow petition to the laws it cites.
// It is a Library entity distinct from laws -- it carries no governance
// weight and does not appear in the law hierarchy.
// See: ARCHITECTURE.md#dispute-records
message DisputeRecord {
  // The stable identifier linking to the petition artefact.
  string petition_id = 1;
  // The law IDs whose conflicts prompted the petition.
  repeated string cited_law_ids = 2;
  // Timestamp when the dispute record was created.
  google.protobuf.Timestamp created_at = 3;
  // Current status of the dispute record.
  DisputeStatus status = 4;
}

message CreateDisputeRecordRequest {
  // The petition artefact's stable identifier.
  string petition_id = 1;
  // The law IDs cited in the petition's changes.
  repeated string cited_law_ids = 2;
}

message CreateDisputeRecordResponse {
  DisputeRecord record = 1;
}

message RetireDisputeRecordRequest {
  // The petition ID of the dispute record to retire.
  string petition_id = 1;
}

message RetireDisputeRecordResponse {
  bool acknowledged = 1;
}

message GetActiveDisputesRequest {
  // Optional: filter to disputes citing this specific law ID.
  // Empty means return all active disputes.
  string law_id = 1;
}

message GetActiveDisputesResponse {
  repeated DisputeRecord records = 1;
}

// --- Semantic Search Messages ---

message SearchSimilarLawsRequest {
  // The text to search for semantically similar laws.
  string query_text = 1;
  // Optional scope filter. When set, only laws in this division are returned.
  string scope_filter = 2;
  // Maximum number of results to return. Zero or negative means server default.
  int32 limit = 3;
}

message SearchSimilarLawsResponse {
  repeated SimilarLaw results = 1;
}

// A law with its similarity score from a semantic search.
message SimilarLaw {
  Law law = 1;
  float similarity_score = 2;
}
