syntax = "proto3";

package flow.v1;

option go_package = "github.com/gideas/flow/proto/flow/v1;flowv1";

import "flow/v1/common.proto";
import "google/protobuf/duration.proto";

// OperatorService handles Workitem control-plane mutations.
// Node-facing methods are reached through the Sidecar.
// See: specs/05-reference/grpc-api.md#operator-api
service OperatorService {
  // --- Node-Facing Methods (via Sidecar) ---

  // Submits the handler's routing instruction. The Operator validates routing
  // guards and applies the lifecycle transition.
  rpc SubmitResult(SubmitResultRequest) returns (SubmitResultResponse);

  // Returns the Flow topology visible to the calling node. Requires READ:flow
  // capability. The Sidecar injects node identity; the Operator resolves the
  // calling node's outputs, all peer nodes with capabilities, and the bound
  // exit contract (if exit-bound).
  rpc GetFlowTopology(GetFlowTopologyRequest) returns (GetFlowTopologyResponse);

  // Creates a new Workitem in Pending. The creating node must be entry-bound.
  // The Operator validates the bound entry contract against artefact state.
  rpc CreateWorkitem(CreateWorkitemRequest) returns (CreateWorkitemResponse);

  // Creates a child Workitem in Pending with parentWorkitemID set to the
  // caller's current Workitem. The Operator applies the flow.gideas.io/parent
  // label. Requires CREATE:workitem/child capability. Identity comes from
  // Sidecar-injected metadata — the request body is empty.
  rpc CreateChildWorkitem(CreateChildWorkitemRequest) returns (CreateChildWorkitemResponse);

  // Submits a routing instruction for a child Workitem. The Operator validates
  // that the child's parentWorkitemID matches the caller's current Workitem,
  // that the child is in Pending state (not yet routed), and that the routing
  // target exists. If the creating node has childWorkitems.entryContract
  // configured, the Operator validates the child's artefact state against
  // that contract before routing.
  rpc RouteChild(RouteChildRequest) returns (RouteChildResponse);

  // Returns the current state of all child Workitems for the caller's parent
  // Workitem. The Operator queries by flow.gideas.io/parent label and includes
  // artefact references from the Archivist. Identity comes from Sidecar-injected
  // metadata — the request body is empty.
  rpc GetChildren(GetChildrenRequest) returns (GetChildrenResponse);

  // Explicitly resumes a suspended Workitem. The Operator validates the
  // Workitem is in Suspended phase and re-dispatches it to the same node
  // type that suspended it.
  rpc ResumeWorkitem(ResumeWorkitemRequest) returns (ResumeWorkitemResponse);

  // Returns workitems in Suspended phase whose resume condition contains
  // the given filter string. Used by watcher nodes to discover workitems
  // held on a specific condition (e.g. dispute_retired("petition-id")).
  rpc ListSuspendedWorkitems(ListSuspendedWorkitemsRequest) returns (ListSuspendedWorkitemsResponse);

  // --- Service-Facing Methods ---

  // Validates that a parent-child Workitem relationship exists and that the
  // child is in Completed state. Called by the Archivist to authorise
  // cross-Workitem artefact reads. Returns valid=true only when the child
  // exists, its ParentWorkitemID matches the given parent, and the child
  // is Completed. On Operator failure the caller should fail closed.
  rpc ValidateChildAccess(ValidateChildAccessRequest) returns (ValidateChildAccessResponse);

}

// --- Request/Response Messages ---

// The Operator uses Sidecar-injected identity context for namespace/node.
// Optional metadata is stored on the Workitem CRD and propagated to the
// handler via WorkitemContext.Metadata.
message CreateWorkitemRequest {
  map<string, string> metadata = 1;
}

// Reason for workitem completion. Stored on workitem status and filterable
// in CEL suspend conditions.
enum CompletionReason {
  COMPLETION_REASON_UNSPECIFIED = 0;  // success (default, backward compatible)
  COMPLETION_REASON_CANCELLED = 1;    // HITL cancelled
}

message SubmitResultRequest {
  // Workitem to submit the result for. Resolved from Sidecar-injected
  // metadata when empty.
  string workitem_id = 1;

  // The action to perform. Exactly one must be set.
  oneof action {
    CompleteAction complete = 3;
    RouteAction route = 4;
    SuspendAction suspend = 5;
  }
}

// Completes the workitem. Requires exit-bound node or exit contract
// satisfaction. Optional reason distinguishes success from cancellation.
message CompleteAction {
  CompletionReason reason = 1;
}

// Routes the workitem to the named output or directly to a target node.
message RouteAction {
  // Output name (for output routing) or node name (for direct routing).
  string target = 1;
  // When true, target is an output name resolved via the node's declared
  // outputs. When false, target is a direct node name (requires ROUTE:direct
  // capability).
  bool output = 2;
}

// Suspends the workitem. The handler should return nil after calling this.
// The Operator transitions the workitem to the Suspended phase. On resume,
// the workitem is re-dispatched to the same node type that suspended it.
message SuspendAction {
  // CEL expression for auto-resume. Empty means manual Resume() required.
  // Available variables: children (list with phase, node, completion_reason),
  // elapsed (duration since suspension), metadata (workitem metadata).
  string condition = 1;
  // Optional timeout. Capped by Flow CRD maxSuspendTimeout. If the condition
  // is not met before the deadline, the workitem fails (not resumes).
  google.protobuf.Duration timeout = 2;
}

message SubmitResultResponse {
  bool accepted = 1;
}

message CreateWorkitemResponse {
  string workitem_id = 1;
}

// Empty — identity comes from Sidecar-injected metadata.
message CreateChildWorkitemRequest {}

message CreateChildWorkitemResponse {
  string child_workitem_id = 1;
}

message RouteChildRequest {
  string child_workitem_id = 1;
  RoutingInstruction routing_instruction = 2;
}

message RouteChildResponse {
  bool accepted = 1;
}

// Empty — identity comes from Sidecar-injected metadata.
message GetChildrenRequest {}

message GetChildrenResponse {
  repeated ChildWorkitemStatus children = 1;
}

// Status snapshot of a child Workitem.
message ChildWorkitemStatus {
  // Child Workitem identifier.
  string workitem_id = 1;
  // Current lifecycle phase: Pending, Running, Suspended, Completed, Failed.
  string phase = 2;
  // Node currently assigned to the child. Empty when Pending.
  string current_assignee = 3;
  // Artefact references associated with the child in the Archivist.
  repeated ArtefactRef artefacts = 4;
  // Completion reason (only meaningful when phase is Completed).
  CompletionReason completion_reason = 5;
}

message ResumeWorkitemRequest {
  string workitem_id = 1;
}

message ResumeWorkitemResponse {
  bool accepted = 1;
}

// Empty — identity comes from Sidecar-injected metadata.
message GetFlowTopologyRequest {}

message GetFlowTopologyResponse {
  // The calling node's definition (name, capabilities, outputs).
  FlowNode self = 1;
  // All nodes in the flow, keyed by node name.
  map<string, FlowNode> nodes = 2;
  // The exit contract bound to the calling node (if exit-bound).
  // Map of governed artefact name to required stamp names.
  // Empty if the calling node is not exit-bound.
  map<string, StampRequirements> exit_contract = 3;
}

// A node in the flow topology.
message FlowNode {
  string name = 1;
  repeated string capabilities = 2;
  repeated FlowOutput outputs = 3;
}

// A named routing output on a node.
message FlowOutput {
  string name = 1;
  string target = 2;
}

// List of required stamp names for a governed artefact in a contract.
message StampRequirements {
  repeated string stamps = 1;
}

// --- ValidateChildAccess (Service-Facing) ---

message ValidateChildAccessRequest {
  // The Workitem claiming to be the parent.
  string parent_workitem_id = 1;
  // The child Workitem to validate.
  string child_workitem_id = 2;
}

message ValidateChildAccessResponse {
  // True only when child exists, parent matches, and child is Completed.
  bool valid = 1;
  // Current lifecycle phase of the child (for diagnostics). Empty if child
  // was not found.
  string phase = 2;
}

// --- ListSuspendedWorkitems ---

message ListSuspendedWorkitemsRequest {
  // Filter by condition substring. Returns only suspended workitems
  // whose resume_condition contains this string.
  string condition_contains = 1;
}

message ListSuspendedWorkitemsResponse {
  repeated SuspendedWorkitemInfo workitems = 1;
}

// Summary of a suspended workitem returned by ListSuspendedWorkitems.
message SuspendedWorkitemInfo {
  string workitem_id = 1;
  string resume_condition = 2;
}
