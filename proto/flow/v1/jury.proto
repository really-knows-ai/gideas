syntax = "proto3";

package flow.v1;

option go_package = "github.com/gideas/flow/proto/flow/v1;flowv1";

// JuryService provides multi-agent deliberation with structured consensus.
// A generic deliberation engine: receives a question and evidence, empanels
// jurors with diverse judicial philosophies, and returns a verdict.
// See: specs/05-reference/grpc-api.md#jury-api
service JuryService {
  // Conducts a deliberation over the provided question and evidence.
  // Empanels jurors, runs voting rounds until consensus or max_rounds,
  // and returns the outcome with per-juror justifications.
  rpc Deliberate(DeliberateRequest) returns (DeliberateResponse);
}

// --- Enums ---

// Strategy for determining whether consensus has been reached.
enum ConsensusStrategy {
  CONSENSUS_STRATEGY_UNSPECIFIED = 0;
  CONSENSUS_STRATEGY_SIMPLE_MAJORITY = 1;  // >50%
  CONSENSUS_STRATEGY_SUPER_MAJORITY = 2;   // >=66%
  CONSENSUS_STRATEGY_UNANIMITY = 3;        // 100%
}

// --- Messages ---

message DeliberateRequest {
  // What the jury is deliberating.
  string question = 1;

  // Structured markdown evidence bundle.
  string evidence = 2;

  // Valid vote values. The Jury builds the output JSON Schema dynamically
  // from these values, ensuring juror votes are always valid outcomes.
  repeated string allowed_outcomes = 3;

  // Strategy for counting votes.
  ConsensusStrategy consensus_strategy = 4;

  // Maximum number of deliberation rounds before declaring a hung jury.
  int32 max_rounds = 5;

  // Number of jurors to empanel from the pool.
  int32 jury_size = 6;
}

message DeliberateResponse {
  // Winning outcome (one of allowed_outcomes), empty if hung.
  string outcome = 1;

  // Per-juror reasoning from the final round.
  repeated JurorJustification justifications = 2;

  // Number of deliberation rounds executed.
  int32 rounds_used = 3;

  // True if consensus was not reached after max_rounds.
  bool hung = 4;
}

// A single juror's vote and reasoning from a deliberation round.
message JurorJustification {
  // Opaque juror identifier (e.g. "textualist-0").
  string juror_id = 1;

  // The outcome this juror voted for.
  string outcome = 2;

  // The juror's reasoning for their vote.
  string reasoning = 3;
}
