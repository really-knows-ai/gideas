---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: foundrynodes.flow.gideas.io
spec:
  group: flow.gideas.io
  names:
    kind: FoundryNode
    listKind: FoundryNodeList
    plural: foundrynodes
    singular: foundrynode
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: |-
          FoundryNode is the Schema for the foundrynodes API.
          It defines node-local behaviour, permission envelope, and routing topology.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of FoundryNode
            properties:
              capabilities:
                description: |-
                  capabilities are the capability grant strings.
                  Grammar: VERB:RESOURCE[/QUALIFIER].
                items:
                  type: string
                type: array
              childWorkitems:
                description: |-
                  childWorkitems configures optional entry and exit contracts for child Workitems
                  created by this node. When set, the Operator validates child Workitems against
                  these contracts at creation and completion time. These are developer-opted
                  validation guards, not platform-mandatory governance.
                properties:
                  entryContract:
                    additionalProperties:
                      items:
                        type: string
                      type: array
                    description: |-
                      entryContract defines the artefact and stamp requirements that must be satisfied
                      on a child Workitem before it can be routed (via RouteChild).
                    type: object
                  exitContract:
                    additionalProperties:
                      items:
                        type: string
                      type: array
                    description: |-
                      exitContract defines the artefact and stamp requirements that must be satisfied
                      on a child Workitem before it can be completed.
                    type: object
                type: object
              concurrency:
                default: 1
                description: |-
                  concurrency is the maximum concurrent Workitem assignments per pod.
                  Default 1. Value 0 means unlimited.
                format: int32
                minimum: 0
                type: integer
              entry:
                description: |-
                  entry is the name of the entry contract this node is bound to.
                  Must reference a key in the FoundryFlow's entryContracts.
                type: string
              exit:
                description: |-
                  exit is the name of the exit contract this node is bound to.
                  Must reference a key in the FoundryFlow's exitContracts. Grants complete() eligibility.
                type: string
              image:
                description: image is the container image for the node.
                minLength: 1
                type: string
              outputs:
                description: outputs are the named routing outputs. Each output maps
                  a name to a target node.
                items:
                  description: Output defines a named routing output mapping to a
                    target node.
                  properties:
                    name:
                      description: name is the output channel name. Referenced by
                        route_to_output instructions.
                      minLength: 1
                      type: string
                    target:
                      description: target is the target node name. Must reference
                        an existing FoundryNode in the namespace.
                      minLength: 1
                      type: string
                  required:
                  - name
                  - target
                  type: object
                type: array
              storage:
                description: |-
                  storage defines volume mounts and deployment strategy.
                  Presence of persistent volumes triggers StatefulSet deployment;
                  otherwise ReplicaSet (default).
                properties:
                  deploymentStrategy:
                    default: ReplicaSet
                    description: 'deploymentStrategy is the deployment strategy: ReplicaSet
                      (default) or StatefulSet.'
                    enum:
                    - ReplicaSet
                    - StatefulSet
                    type: string
                  volumes:
                    description: |-
                      volumes are the volume mount declarations.
                      Injected into both node and Sidecar containers.
                    items:
                      description: VolumeMount defines a volume mount declaration
                        for node storage.
                      properties:
                        mountPath:
                          description: mountPath is the path where the volume is mounted
                            in the container.
                          type: string
                        name:
                          description: name is the name of the volume mount.
                          type: string
                        size:
                          description: size is the requested storage size (e.g. "1Gi",
                            "500Mi").
                          type: string
                      required:
                      - mountPath
                      - name
                      type: object
                    type: array
                type: object
              timeout:
                description: |-
                  timeout is the inactivity timeout for assignments to this node.
                  Cannot exceed governancePolicy.maxTimeout on the FoundryFlow.
                  Falls back to governancePolicy.defaultTimeout if unset.
                type: string
            required:
            - image
            type: object
          status:
            description: status defines the observed state of FoundryNode
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the FoundryNode resource.
                  Standard Kubernetes conditions for reconciliation health.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
