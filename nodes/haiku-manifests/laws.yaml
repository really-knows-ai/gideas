# Haiku Foundry Cycle — Content Governance Laws
#
# Apply AFTER the basic flow completes successfully (Phase 2 of tutorial).
# These laws prohibit weather and atmospheric imagery in haikus, creating
# deliberate friction. Re-run the flow with a storm-themed prompt to see
# the governance cycle wrestle with the constraints.
#
# Apply:
#   kubectl apply -f laws.yaml
---
apiVersion: flow.gideas.io/v1
kind: LawGroup
metadata:
  name: content
  namespace: default
spec:
  mode: law-by-law
  passes: 2
---
apiVersion: flow.gideas.io/v1
kind: Law
metadata:
  name: no-weather
  namespace: default
  labels:
    flow.gideas.io/flow-name: haiku-flow
spec:
  goal: "Absolutely no references to the weather or meteorological phenomena"
  tier: 3
  group: "content"
  appliesTo:
    - haiku
  representations:
    - type: text/markdown
      content: |
        Haiku must not reference weather or meteorological phenomena of any kind.

        Prohibited: rain, snow, sleet, hail, thunder, lightning, storms, 
        wind, breeze, gale, temperature (hot, cold, warm), humidity.

        Examples:
        - "winter rain" — weather reference
        - "cold wind blows" — temperature + wind

        The governing body tolerates zero weather.
---
apiVersion: flow.gideas.io/v1
kind: Law
metadata:
  name: no-atmosphere
  namespace: default
  labels:
    flow.gideas.io/flow-name: haiku-flow
spec:
  goal: "Absolutely no references to atmospheric conditions, sky, or seasonal imagery"
  tier: 3
  group: "content"
  appliesTo:
    - haiku
  representations:
    - type: text/markdown
      content: |
        Haiku must not reference atmospheric conditions, the sky, or seasonal
        imagery of any kind.

        Prohibited: sun, moon, stars, sky, clouds, fog, mist, frost, dew,
        dawn, dusk, twilight, seasons (spring, summer, autumn, winter), 
        seasonal markers (cherry blossoms, falling leaves, snow on branches).

        Examples:
        - "autumn leaves fall" — seasonal reference
        - "morning frost melts" — atmospheric condition
        - "clouds drift by" — sky reference

        The haiku must stay earthbound.
