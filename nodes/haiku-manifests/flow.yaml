# Haiku Foundry Cycle — Flow Configuration
#
# This defines the hello-world Foundry Cycle for haiku creation with Sort as the
# central routing hub. Every node feeds back to Sort, which triages governance
# state and routes accordingly.
#
# Topology:
#   Forge ──[default]──→ Sort ──[quench]──→ Quench ──[default]──→ Sort
#                         │──[appraisal]──→ Appraisal ──[default]──→ Sort
#                         │                  └──[fan-out]──→ Appraiser(s) ──[Complete]──┘
#                         │──[refine]────→ Refine ──[default]───→ Sort
#                         └──Complete() (exit)
#
# Sort's decision tree:
#   1. Missing "linter" stamp?        → route to Quench
#   2. Missing "appraise-*" stamp?    → route to Appraisal
#   3. Unresolved feedback?           → route to Refine
#   4. All clear?                     → stamp "approval", Complete()
#
# Artefacts:
#   - petition: The creative brief, pre-populated at workitem creation.
#   - haiku: The governed output, must carry [linter, appraise-security, approval].
#   - review-data: Internal data transfer between Appraisal and Appraiser children.
#
# Apply order:
#   1. kubectl apply -f flow.yaml          (this file)
#   2. kubectl apply -f configmaps.yaml    (node configuration)
#   3. kubectl apply -f workitem.yaml      (trigger the cycle)
---
apiVersion: flow.gideas.io/v1
kind: GovernedArtefact
metadata:
  name: haiku
  namespace: default
spec:
  stamps:
    - linter
    - appraise-security
    - appraise-*
    - approval
---
apiVersion: flow.gideas.io/v1
kind: GovernedArtefact
metadata:
  name: petition
  namespace: default
spec:
  stamps:
    - appraise-security
    - approval
---
apiVersion: flow.gideas.io/v1
kind: GovernedArtefact
metadata:
  name: review-data
  namespace: default
spec:
  stamps: []
---
apiVersion: flow.gideas.io/v1
kind: FoundryFlow
metadata:
  name: haiku-flow
  namespace: default
spec:
  entryContracts:
    # The petition must exist when the workitem enters the flow.
    standard-entry:
      "petition": []
  exitContracts:
    # The haiku must carry linter, appraise-security, and approval stamps to exit.
    standard-exit:
      "haiku":
        - linter
        - appraise-security
        - approval
  nodeGroups:
    main-cycle:
      nodes:
        - forge
        - sort
        - quench
        - appraisal
        - appraiser
        - refine
  governancePolicy:
    maxVisits: 20
    defaultTimeout: "10m"
    maxTimeout: "30m"
---
# --- Node Definitions (Topology) ---

apiVersion: flow.gideas.io/v1
kind: FoundryNode
metadata:
  name: forge
  namespace: default
  labels:
    flow.gideas.io/flow-name: haiku-flow
spec:
  image: forge:fix-models
  entry: "standard-entry"
  outputs:
    - name: "default"
      target: "sort"
  capabilities:
    - "READ:artefact"
    - "WRITE:artefact/haiku"
    - "READ:law"
---
apiVersion: flow.gideas.io/v1
kind: FoundryNode
metadata:
  name: sort
  namespace: default
  labels:
    flow.gideas.io/flow-name: haiku-flow
spec:
  image: sort:latest
  exit: "standard-exit"
  outputs:
    - name: "quench"
      target: "quench"
    - name: "appraisal"
      target: "appraisal"
    - name: "refine"
      target: "refine"
  capabilities:
    - "READ:artefact/haiku"
    - "READ:feedback"
    - "READ:flow"
    - "STAMP:artefact/haiku/approval"
---
apiVersion: flow.gideas.io/v1
kind: FoundryNode
metadata:
  name: quench
  namespace: default
  labels:
    flow.gideas.io/flow-name: haiku-flow
spec:
  image: haiku-quench:latest
  outputs:
    - name: "default"
      target: "sort"
  capabilities:
    - "READ:artefact/haiku"
    - "READ:feedback"
    - "WRITE:feedback/new"
    - "STAMP:artefact/haiku/linter"
---
apiVersion: flow.gideas.io/v1
kind: FoundryNode
metadata:
  name: appraisal
  namespace: default
  labels:
    flow.gideas.io/flow-name: haiku-flow
spec:
  image: appraisal:latest
  outputs:
    - name: "default"
      target: "sort"
  capabilities:
    - "READ:artefact/petition"
    - "READ:artefact/haiku"
    - "READ:feedback"
    - "READ:law"
    - "WRITE:feedback/new"
    - "WRITE:feedback/resolved"
    - "WRITE:feedback/rejected"
    - "STAMP:artefact/haiku/appraise-security"
    - "CREATE:workitem/child"
---
apiVersion: flow.gideas.io/v1
kind: FoundryNode
metadata:
  name: appraiser
  namespace: default
  labels:
    flow.gideas.io/flow-name: haiku-flow
spec:
  image: appraiser:latest
  outputs: []
  capabilities:
    - "READ:artefact/review-data"
    - "WRITE:artefact/review-data"
---
apiVersion: flow.gideas.io/v1
kind: FoundryNode
metadata:
  name: refine
  namespace: default
  labels:
    flow.gideas.io/flow-name: haiku-flow
spec:
  image: refine:fix-models
  outputs:
    - name: "default"
      target: "sort"
  capabilities:
    - "READ:artefact/petition"
    - "READ:artefact/haiku"
    - "WRITE:artefact/haiku"
    - "READ:feedback"
    - "WRITE:feedback/actioned"
    - "WRITE:feedback/wont_fix"
    - "READ:law"
