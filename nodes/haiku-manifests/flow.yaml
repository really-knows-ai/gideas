  namespace: default
spec:
  stamps: []
---
apiVersion: flow.gideas.io/v1
kind: FoundryFlow
metadata:
  name: haiku-flow
  namespace: default
spec:
  entryContracts:
    # The petition must exist when the workitem enters the flow.
    standard-entry:
      "petition": []
    # A law-reference artefact must exist for judiciary watcher entry.
    hearing-entry:
      "law-reference": []
  exitContracts:
    # The haiku must carry linter, review, and approval stamps to exit.
    standard-exit:
      "haiku":
        - linter
        - review
        - approval
    # The petition must carry review + approval stamps to exit the Clerk cycle.
    clerk-exit:
      "petition":
        - review
        - approval
  nodeGroups:
    main-cycle:
      nodes:
        - forge
        - sort
        - quench
        - appraisal
        - appraiser
        - refine
    judiciary:
      nodes:
        - facilitator
        - arbiter
        - juror
        - tribunal
        - friction-watcher
        - ttl-watcher
        - hitl-appraise
        - arbiter-hitl-resolve
        - tribunal-hitl-resolve
        - law-applicator
    clerk-cycle:
      nodes:
        - clerk-forge
        - clerk-sort
        - clerk-appraise
        - clerk-refine
        - clerk-facilitator
        - codification
        - codify-smt
        - clerk-done-router
        - hitl-gate
  governancePolicy:
    maxVisits: 20
    defaultTimeout: "10m"
    maxTimeout: "30m"
---
# --- Node Definitions (Topology) ---

apiVersion: flow.gideas.io/v1
kind: FoundryNode
metadata:
  name: forge
  namespace: default
  labels:
    flow.gideas.io/flow-name: haiku-flow
spec:
  image: forge:latest
  entry: "standard-entry"
  outputs:
    - name: "default"
      target: "sort"
  capabilities:
    - "READ:artefact"
    - "WRITE:artefact/haiku"
    - "READ:law"
---
apiVersion: flow.gideas.io/v1
kind: FoundryNode
metadata:
  name: sort
  namespace: default
  labels:
    flow.gideas.io/flow-name: haiku-flow
spec:
  image: sort:latest
  exit: "standard-exit"
  outputs:
    - name: "quench"
      target: "quench"
    - name: "appraisal"
      target: "appraisal"
    - name: "refine"
      target: "refine"
    - name: "arbiter"
      target: "facilitator"
  capabilities:
    - "READ:artefact/haiku"
    - "READ:feedback"
    - "STAMP:artefact/haiku/approval"
    - "SUSPEND:workitem"
---
apiVersion: flow.gideas.io/v1
kind: FoundryNode
metadata:
  name: quench
  namespace: default
  labels:
    flow.gideas.io/flow-name: haiku-flow
spec:
  image: haiku-quench:latest
  outputs:
    - name: "default"
      target: "sort"
  capabilities:
    - "READ:artefact/haiku"
    - "STAMP:artefact/haiku/linter"
---
apiVersion: flow.gideas.io/v1
kind: FoundryNode
metadata:
  name: appraisal
  namespace: default
  labels:
    flow.gideas.io/flow-name: haiku-flow
spec:
  image: appraisal:latest
  outputs:
    - name: "default"
      target: "sort"
  capabilities:
    - "READ:artefact/petition"
    - "READ:artefact/haiku"
    - "READ:law"
    - "WRITE:feedback/new"
    - "WRITE:feedback/resolved"
    - "WRITE:feedback/rejected"
    - "STAMP:artefact/haiku/appraisal"
    - "CREATE:workitem/child"
---
apiVersion: flow.gideas.io/v1
kind: FoundryNode
metadata:
  name: appraiser
  namespace: default
  labels:
    flow.gideas.io/flow-name: haiku-flow
spec:
  image: appraiser:latest
  outputs: []
  capabilities:
    - "READ:artefact/review-data"
    - "WRITE:artefact/review-data"
---
apiVersion: flow.gideas.io/v1
kind: FoundryNode
metadata:
  name: refine
  namespace: default
  labels:
    flow.gideas.io/flow-name: haiku-flow
spec:
  image: refine:latest
  outputs:
    - name: "default"
      target: "sort"
  capabilities:
    - "READ:artefact/petition"
    - "READ:artefact/haiku"
    - "WRITE:artefact/haiku"
    - "READ:feedback"
    - "WRITE:feedback/actioned"
    - "WRITE:feedback/wont_fix"
    - "READ:law"
---
apiVersion: flow.gideas.io/v1
