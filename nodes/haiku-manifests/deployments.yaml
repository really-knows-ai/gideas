# Haiku Foundry Cycle — Node Deployments
#
# Each node runs as a Deployment with two containers:
#   1. The node container (user code) — runs on :50053
#   2. The sidecar container — runs on :50051, proxies to services
#
# The sidecar connects to:
#   - Operator at OPERATOR_ADDRESS (default: flow-operator:50052)
#   - Archivist at ARCHIVIST_ADDRESS (default: flow-archivist:50054)
#   - Librarian at LIBRARIAN_ADDRESS (default: flow-librarian:50058)
#   - Event Bus at EVENT_BUS_ADDRESS (default: flow-eventbus:50056)
#   - Friction Ledger at FRICTION_LEDGER_ADDRESS (default: flow-frictionledger:50057)
#
# Prerequisites:
#   - Build node images (one per node)
#   - Build sidecar image: docker build -t flow-sidecar:latest -f sidecar/Dockerfile .
#   - Deploy system services (operator, archivist, librarian, eventbus, frictionledger, monitor)
#   - Apply flow.yaml first (CRDs must exist before deployments)
---
# --- Forge ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge
  namespace: default
  labels:
    app.kubernetes.io/name: forge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forge
        flow.gideas.io/node-name: forge
    spec:
      containers:
        - name: node
          image: forge:latest
          ports:
            - containerPort: 50053
          env:
            - name: FLOW_NODE_PORT
              value: "50053"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
          volumeMounts:
            - name: node-config
              mountPath: /etc/foundry
              readOnly: true
        - name: sidecar
          image: flow-sidecar:latest
          ports:
            - containerPort: 50051
          env:
            - name: FLOW_NODE_ID
              value: "forge"
            - name: FLOW_SIDECAR_PORT
              value: "50051"
            - name: OPERATOR_ADDRESS
              value: "flow-operator:50052"
            - name: ARCHIVIST_ADDRESS
              value: "flow-archivist:50054"
            - name: LIBRARIAN_ADDRESS
              value: "flow-librarian:50058"
            - name: EVENT_BUS_ADDRESS
              value: "flow-eventbus:50056"
            - name: FRICTION_LEDGER_ADDRESS
              value: "flow-frictionledger:50057"
      volumes:
        - name: node-config
          configMap:
            name: forge-config
