# Haiku Foundry Cycle — Node ConfigMaps
#
# Configuration files for nodes that use ConfigMap-mounted YAML config.
# Each ConfigMap is mounted at /etc/foundry/node-config.yaml inside the
# node container (see deployments.yaml for volume definitions).
#
# Apply order:
#   1. kubectl apply -f flow.yaml          (CRDs)
#   2. kubectl apply -f configmaps.yaml    (this file)
#   3. kubectl apply -f deployments.yaml   (node pods)
#   4. kubectl apply -f workitem.yaml      (trigger the cycle)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forge-config
  namespace: default
  labels:
    app.kubernetes.io/name: forge
data:
  node-config.yaml: |
    inputArtefacts: ["petition"]
    outputArtefact: "haiku"
    governedArtefact: "haiku"
    outputField: "haiku"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sort-config
  namespace: default
  labels:
    app.kubernetes.io/name: sort
data:
  node-config.yaml: |
    nodeOrder: "quench,appraise"
    deadlockThreshold: 3
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: appraise-config
  namespace: default
  labels:
    app.kubernetes.io/name: appraise
data:
  node-config.yaml: |
    inputArtefacts: ["petition"]
    reviewArtefact: "haiku"
    governedArtefact: "haiku"
    stampName: "review"
    reviewerNode: "reviewer"
    divisionPrompts:
      security: "Pay special attention to information disclosure and injection risks."
      architecture: "Focus on structural patterns, separation of concerns, and maintainability."
      style: "Evaluate adherence to style guides, naming conventions, and consistency."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: reviewer-config
  namespace: default
  labels:
    app.kubernetes.io/name: reviewer
data:
  node-config.yaml: |
    inputArtefacts: ["input"]
    reviewArtefact: "review"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: refine-config
  namespace: default
  labels:
    app.kubernetes.io/name: refine
data:
  node-config.yaml: |
    inputArtefacts: ["petition"]
    outputArtefact: "haiku"
    governedArtefact: "haiku"
    outputField: "haiku"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: facilitator-config
  namespace: default
  labels:
    app.kubernetes.io/name: facilitator
data:
  node-config.yaml: |
    arbiterNode: "arbiter"
    inputArtefacts: ["petition"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: arbiter-config
  namespace: default
  labels:
    app.kubernetes.io/name: arbiter
data:
  node-config.yaml: |
    jurySize: 5
    jurorNode: "juror"
    consensusStrategy: "SIMPLE_MAJORITY"
    maxRounds: 3
    clerkNode: "clerk-forge"
    hungOutput: "hung"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: juror-config
  namespace: default
  labels:
    app.kubernetes.io/name: juror
data:
  node-config.yaml: |
    personality: "textualist"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tribunal-config
  namespace: default
  labels:
    app.kubernetes.io/name: tribunal
data:
  node-config.yaml: |
    jurySize: 5
    jurorNode: "juror"
    consensusStrategy: "SIMPLE_MAJORITY"
    maxRounds: 3
    clerkNode: "clerk-forge"
    hungOutput: "hung"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ttl-watcher-config
  namespace: default
  labels:
    app.kubernetes.io/name: ttl-watcher
data:
  node-config.yaml: |
    scanPeriod: "5m"
    tier1: "168h"
    tier2: "720h"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hitl-appraise-config
  namespace: default
  labels:
    app.kubernetes.io/name: hitl-appraise
data:
  node-config.yaml: |
    choiceLabels:
      approved: "Approve Petition"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: arbiter-hitl-resolve-config
  namespace: default
  labels:
    app.kubernetes.io/name: arbiter-hitl-resolve
data:
  node-config.yaml: |
    choiceLabels:
      resolution: "Provide Resolution"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tribunal-hitl-resolve-config
  namespace: default
  labels:
    app.kubernetes.io/name: tribunal-hitl-resolve
data:
  node-config.yaml: |
    choiceLabels:
      resolution: "Provide Resolution"
---
# --- Clerk Forge ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clerk-forge-config
  namespace: default
  labels:
    app.kubernetes.io/name: clerk-forge
data:
  node-config.yaml: |
    inputArtefacts: ["verdict-context"]
    outputArtefact: "petition"
    governedArtefact: "petition"
    outputField: "petition"
    systemPrompt: |
      You are a legal clerk drafting governance petitions. Given a court's verdict
      decision, produce a structured YAML petition with concrete law changes
      (create, retire, demote) that faithfully implement the court's reasoning.
      Each change must include a justification grounded in the verdict.
    queryTemplate: |
      The court has issued the following verdict decision:

      {{.Input}}

      Draft a governance petition that implements this decision. The petition must
      include concrete law changes with justifications. Output valid YAML matching
      the petition schema.
---
# --- Clerk Sort ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clerk-sort-config
  namespace: default
  labels:
    app.kubernetes.io/name: clerk-sort
data:
  node-config.yaml: |
    nodeOrder: "appraise"
    deadlockThreshold: 3
---
# --- Clerk Appraise ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clerk-appraise-config
  namespace: default
  labels:
    app.kubernetes.io/name: clerk-appraise
data:
  node-config.yaml: |
    inputArtefacts: ["verdict-context"]
    reviewArtefact: "petition"
    governedArtefact: "petition"
    stampName: "review"
    reviewerNode: "reviewer"
    divisionPrompts:
      alignment: "Verify the petition faithfully implements the court's verdict decision. Check that each change is justified by the verdict reasoning."
      completeness: "Check that all aspects of the verdict are addressed. Verify no law changes are missing or extraneous."
      feasibility: "Assess whether the proposed law changes are well-formed and internally consistent."
---
# --- Clerk Refine ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clerk-refine-config
  namespace: default
  labels:
    app.kubernetes.io/name: clerk-refine
data:
  node-config.yaml: |
    inputArtefacts: ["verdict-context"]
    outputArtefact: "petition"
    governedArtefact: "petition"
    outputField: "petition"
    systemPrompt: |
      You are a legal clerk revising a governance petition based on review feedback.
      The petition must faithfully implement the court's verdict decision. Address
      each piece of feedback while maintaining alignment with the verdict.
    queryTemplate: |
      Original verdict decision:
      {{.VerdictContext}}

      Current petition:
      {{.Input}}

      Review feedback to address:
      {{.Feedback}}

      Revise the petition to address the feedback while maintaining alignment with
      the verdict. Output valid YAML matching the petition schema.
---
# --- Clerk Facilitator ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clerk-facilitator-config
  namespace: default
  labels:
    app.kubernetes.io/name: clerk-facilitator
data:
  node-config.yaml: |
    arbiterNode: "arbiter"
    inputArtefacts: ["verdict-context"]
