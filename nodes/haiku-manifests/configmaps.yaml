# Haiku Foundry Cycle — Node ConfigMaps
#
# Configuration files for nodes that use ConfigMap-mounted YAML config.
# Each ConfigMap is mounted at /etc/foundry/node-config.yaml inside the
# node container (see deployments.yaml for volume definitions).
#
# Apply order:
#   1. kubectl apply -f flow.yaml          (CRDs)
#   2. kubectl apply -f configmaps.yaml    (this file)
#   3. kubectl apply -f deployments.yaml   (node pods)
#   4. kubectl apply -f workitem.yaml      (trigger the cycle)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forge-config
  namespace: default
  labels:
    app.kubernetes.io/name: forge
data:
  node-config.yaml: |
    inputArtefacts: ["petition"]
    outputArtefact: "haiku"
    governedArtefact: "haiku"
    outputField: "haiku"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sort-config
  namespace: default
  labels:
    app.kubernetes.io/name: sort
data:
  node-config.yaml: |
    nodeOrder: "quench,appraisal"
    deadlockThreshold: 3
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: appraisal-config
  namespace: default
  labels:
    app.kubernetes.io/name: appraisal
data:
  node-config.yaml: |
    inputArtefacts: ["petition"]
    reviewArtefact: "haiku"
    governedArtefact: "haiku"
    reviewerNode: "appraiser"
    appraisers:
      - id: "skeptic"
        personality: "Pay special attention to information disclosure and injection risks."
      - id: "auditor"
        personality: "Focus on structural patterns, separation of concerns, and maintainability."
      - id: "stylist"
        personality: "Evaluate adherence to style guides, naming conventions, and consistency."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: appraiser-config
  namespace: default
  labels:
    app.kubernetes.io/name: appraiser
data:
  node-config.yaml: |
    inputArtefacts: ["input"]
    reviewArtefact: "review"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: refine-config
  namespace: default
  labels:
    app.kubernetes.io/name: refine
data:
  node-config.yaml: |
    inputArtefacts: ["petition"]
    outputArtefact: "haiku"
    governedArtefact: "haiku"
    outputField: "haiku"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: facilitator-config
  namespace: default
  labels:
    app.kubernetes.io/name: facilitator
data:
  node-config.yaml: |
    arbiterNode: "arbiter"
    inputArtefacts: ["petition"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: arbiter-config
  namespace: default
  labels:
    app.kubernetes.io/name: arbiter
data:
  node-config.yaml: |
    jurySize: 5
    jurorNode: "juror"
    consensusStrategy: "SIMPLE_MAJORITY"
    maxRounds: 3
    clerkNode: "clerk-forge"
    hungOutput: "hung"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: juror-config
  namespace: default
  labels:
    app.kubernetes.io/name: juror
data:
  node-config.yaml: |
    personality: "textualist"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tribunal-config
  namespace: default
  labels:
    app.kubernetes.io/name: tribunal
data:
  node-config.yaml: |
    jurySize: 5
    jurorNode: "juror"
    consensusStrategy: "SIMPLE_MAJORITY"
    maxRounds: 3
    clerkNode: "clerk-forge"
    hungOutput: "hung"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ttl-watcher-config
  namespace: default
  labels:
    app.kubernetes.io/name: ttl-watcher
data:
  node-config.yaml: |
    scanPeriod: "5m"
    tier1: "168h"
    tier2: "720h"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hitl-appraisal-config
  namespace: default
  labels:
    app.kubernetes.io/name: hitl-appraisal
data:
  node-config.yaml: |
    choiceLabels:
      approved: "Approve Petition"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: arbiter-hitl-resolve-config
  namespace: default
  labels:
    app.kubernetes.io/name: arbiter-hitl-resolve
data:
  node-config.yaml: |
    choiceLabels:
      resolution: "Provide Resolution"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tribunal-hitl-resolve-config
  namespace: default
  labels:
    app.kubernetes.io/name: tribunal-hitl-resolve
data:
  node-config.yaml: |
    choiceLabels:
      resolution: "Provide Resolution"
---
# --- Clerk Forge ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clerk-forge-config
  namespace: default
  labels:
    app.kubernetes.io/name: clerk-forge
data:
  node-config.yaml: |
    inputArtefacts: ["verdict-context"]
    outputArtefact: "petition"
    governedArtefact: "petition"
    outputField: "petition"
    systemPrompt: |
      You are a legal clerk drafting governance petitions. Given a court's verdict
      decision, produce a structured YAML petition with concrete law changes
      (create, retire, demote) that faithfully implement the court's reasoning.
      Each change must include a justification grounded in the verdict.
    queryTemplate: |
      The court has issued the following verdict decision:

      {{.Input}}

      Draft a governance petition that implements this decision. The petition must
      include concrete law changes with justifications. Output valid YAML matching
      the petition schema.
---
# --- Clerk Sort ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clerk-sort-config
  namespace: default
  labels:
    app.kubernetes.io/name: clerk-sort
data:
  node-config.yaml: |
    nodeOrder: "appraisal"
    deadlockThreshold: 3
---
# --- Clerk Appraisal ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clerk-appraisal-config
  namespace: default
  labels:
    app.kubernetes.io/name: clerk-appraisal
data:
  node-config.yaml: |
    inputArtefacts: ["verdict-context"]
    reviewArtefact: "petition"
    governedArtefact: "petition"
    reviewerNode: "appraiser"
    appraisers:
      - id: "alignment"
        personality: "Verify the petition faithfully implements the court's verdict decision. Check that each change is justified by the verdict reasoning."
      - id: "completeness"
        personality: "Check that all aspects of the verdict are addressed. Verify no law changes are missing or extraneous."
      - id: "feasibility"
        personality: "Assess whether the proposed law changes are well-formed and internally consistent."
---
# --- Clerk Refine ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clerk-refine-config
  namespace: default
  labels:
    app.kubernetes.io/name: clerk-refine
data:
  node-config.yaml: |
    inputArtefacts: ["verdict-context"]
    outputArtefact: "petition"
    governedArtefact: "petition"
    outputField: "petition"
    systemPrompt: |
      You are a legal clerk revising a governance petition based on review feedback.
      The petition must faithfully implement the court's verdict decision. Address
      each piece of feedback while maintaining alignment with the verdict.
    queryTemplate: |
      Original verdict decision:
      {{.VerdictContext}}

      Current petition:
      {{.Input}}

      Review feedback to address:
      {{.Feedback}}

      Revise the petition to address the feedback while maintaining alignment with
      the verdict. Output valid YAML matching the petition schema.
---
# --- Clerk Facilitator ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clerk-facilitator-config
  namespace: default
  labels:
    app.kubernetes.io/name: clerk-facilitator
data:
  node-config.yaml: |
    arbiterNode: "arbiter"
    inputArtefacts: ["verdict-context"]
---
# --- Codification ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: codification-config
  namespace: default
  labels:
    app.kubernetes.io/name: codification
data:
  node-config.yaml: |
    petitionArtefact: "petition"
    codificationNodes: ["codify-smt"]
    defaultOutput: "default"
---
# --- Codify SMT ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: codify-smt-config
  namespace: default
  labels:
    app.kubernetes.io/name: codify-smt
data:
  node-config.yaml: |
    outputFormat: "application/smt-lib"
---
# --- Clerk Done Router ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clerk-done-router-config
  namespace: default
  labels:
    app.kubernetes.io/name: clerk-done-router
data:
  node-config.yaml: |
    rules:
      - name: "tier-1-2"
        when: 'metadata["petition_max_tier"] in ["FINDING", "RULING"]'
        output: "law-applicator"
      - name: "tier-3-5"
        when: 'true'
        output: "hitl-appraisal"
    default: "hitl-appraisal"
---
# --- HITL Gate ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hitl-gate-config
  namespace: default
  labels:
    app.kubernetes.io/name: hitl-gate
data:
  node-config.yaml: |
    rules:
      - name: "all-approved"
        when: 'true'
        output: "law-applicator"
    default: "law-applicator"
