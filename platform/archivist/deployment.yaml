# Archivist Deployment for Foundry Flow
#
# The Archivist is the "Memory" of the Flow system — a Content-Addressable
# Storage (CAS) service that manages artefact content and provenance.
#
# It listens on port 50054 and is accessed by Sidecars via the
# flow-archivist Service. Data is persisted to a SQLite database on a
# PersistentVolumeClaim.
#
# Prerequisites:
#   - Build archivist image: docker build -t flow-archivist:latest -f archivist/Dockerfile .
#
# For Kind cluster:
#   kind load docker-image flow-archivist:latest --name <cluster>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flow-archivist
  namespace: default
  labels:
    app.kubernetes.io/name: flow-archivist
    app.kubernetes.io/part-of: foundry-flow
    app.kubernetes.io/component: data-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flow-archivist
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flow-archivist
    spec:
      containers:
        - name: archivist
          image: flow-archivist:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50054
              protocol: TCP
          env:
            - name: ARCHIVIST_PORT
              value: "50054"
            - name: ARCHIVIST_DB_PATH
              value: /data/archivist.db
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: archivist-data
---
apiVersion: v1
kind: Service
metadata:
  name: flow-archivist
  namespace: default
  labels:
    app.kubernetes.io/name: flow-archivist
    app.kubernetes.io/part-of: foundry-flow
spec:
  selector:
    app.kubernetes.io/name: flow-archivist
  ports:
    - name: grpc
      port: 50054
      targetPort: 50054
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: archivist-data
  namespace: default
  labels:
    app.kubernetes.io/name: flow-archivist
    app.kubernetes.io/part-of: foundry-flow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
