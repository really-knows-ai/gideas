# Clerk Deployment for Foundry Flow
#
# The Clerk is the legislative drafter of the Judiciary — a standalone gRPC
# service that converts jury verdicts into law representations and persists
# them via the Librarian.
#
# It listens on port 50060 and is accessed by Sidecars via the
# flow-clerk Service.
#
# Prerequisites:
#   - Build clerk image: docker build -t flow-clerk:latest -f clerk/Dockerfile .
#
# For Kind cluster:
#   kind load docker-image flow-clerk:latest --name <cluster>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flow-clerk
  namespace: default
  labels:
    app.kubernetes.io/name: flow-clerk
    app.kubernetes.io/part-of: foundry-flow
    app.kubernetes.io/component: judiciary
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flow-clerk
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flow-clerk
    spec:
      containers:
        - name: clerk
          image: flow-clerk:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50060
              protocol: TCP
          env:
            - name: CLERK_PORT
              value: "50060"
            - name: LIBRARIAN_ADDRESS
              value: "flow-librarian:50058"
---
apiVersion: v1
kind: Service
metadata:
  name: flow-clerk
  namespace: default
  labels:
    app.kubernetes.io/name: flow-clerk
    app.kubernetes.io/part-of: foundry-flow
spec:
  selector:
    app.kubernetes.io/name: flow-clerk
  ports:
    - name: grpc
      port: 50060
      targetPort: 50060
      protocol: TCP
  type: ClusterIP
