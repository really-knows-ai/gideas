# Flow Monitor Deployment for Foundry Flow
#
# The Flow Monitor is a stateless pipeline adapter for the Control Plane.
# It subscribes to the Event Bus telemetry and audit channels and exports:
#   - Prometheus metrics on HTTP /metrics (port 2112)
#   - JSON Lines to stdout for audit events
#
# It persists only a small checkpoint file for replay position.
# See: specs/02-flow/04-system-services.md (Service Invariant #16)
#
# Prerequisites:
#   - Build monitor image: docker build -t flow-monitor:latest -f monitor/Dockerfile .
#
# For Kind cluster:
#   kind load docker-image flow-monitor:latest --name <cluster>
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flow-monitor-data
  namespace: default
  labels:
    app.kubernetes.io/name: flow-monitor
    app.kubernetes.io/part-of: foundry-flow
    app.kubernetes.io/component: control-plane
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flow-monitor
  namespace: default
  labels:
    app.kubernetes.io/name: flow-monitor
    app.kubernetes.io/part-of: foundry-flow
    app.kubernetes.io/component: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flow-monitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flow-monitor
    spec:
      containers:
        - name: monitor
          image: flow-monitor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http-metrics
              containerPort: 2112
              protocol: TCP
          env:
            - name: FLOW_MONITOR_PORT
              value: "2112"
            - name: FLOW_MONITOR_CHECKPOINT_PATH
              value: "/data/monitor-checkpoint.json"
            - name: EVENT_BUS_ADDRESS
              value: "flow-event-bus:50056"
          volumeMounts:
            - name: monitor-data
              mountPath: /data
      volumes:
        - name: monitor-data
          persistentVolumeClaim:
            claimName: flow-monitor-data
---
apiVersion: v1
kind: Service
metadata:
  name: flow-monitor
  namespace: default
  labels:
    app.kubernetes.io/name: flow-monitor
    app.kubernetes.io/part-of: foundry-flow
spec:
  selector:
    app.kubernetes.io/name: flow-monitor
  ports:
    - name: http-metrics
      port: 2112
      targetPort: 2112
      protocol: TCP
  type: ClusterIP
