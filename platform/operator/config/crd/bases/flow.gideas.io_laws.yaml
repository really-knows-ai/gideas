---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: laws.flow.gideas.io
spec:
  group: flow.gideas.io
  names:
    kind: Law
    listKind: LawList
    plural: laws
    singular: law
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.tier
      name: Tier
      type: integer
    - jsonPath: .spec.group
      name: Group
      type: string
    - jsonPath: .status.version
      name: Version
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          Law is the Schema for the laws API.
          Laws are managed by the Librarian and represent enforceable rules within a Flow.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Law
            properties:
              appliesTo:
                description: |-
                  appliesTo lists governed artefact kinds this law applies to.
                  Empty means global — applies to all kinds in the Flow.
                items:
                  type: string
                type: array
              goal:
                description: |-
                  goal is the plain-language statement of what the law enforces, stops, or ensures.
                  The law's identity.
                minLength: 1
                type: string
              group:
                description: |-
                  Group is the law group name. Must match the metadata.name of a LawGroup CRD
                  or be empty (defaults to "default").
                type: string
              representations:
                description: |-
                  representations are one or more typed expressions of the goal.
                  At least one representation is required.
                items:
                  description: Representation is a typed expression of a law's goal.
                  properties:
                    content:
                      description: content is the representation payload.
                      type: string
                    type:
                      description: |-
                        type is the MIME type identifying the representation format
                        (e.g. text/markdown, application/smt-lib, application/python, application/rego).
                      minLength: 1
                      type: string
                  required:
                  - content
                  - type
                  type: object
                minItems: 1
                type: array
              tier:
                description: |-
                  tier is the law tier: 1 (Finding), 2 (Ruling), 3 (Local Statute),
                  4 (State Constitution), 5 (Federal Accord).
                format: int32
                maximum: 5
                minimum: 1
                type: integer
            required:
            - goal
            - representations
            - tier
            type: object
          status:
            description: status defines the observed state of Law
            properties:
              conditions:
                description: conditions represent the current state of the Law resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              version:
                description: |-
                  version is the content hash of the current law version.
                  Any mutation to spec produces a new hash.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
