      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          Treaty is the Schema for the treaties API.
          It defines a directed trust policy for cross-flow collaboration.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Treaty
            properties:
              allowedImportTypes:
                description: |-
                  allowedImportTypes constrains which import types from the receiving Flow's
                  effective import-type namespace the remote Flow may use. If empty, all
                  effective import types are permitted.
                items:
                  type: string
                type: array
              allowedSubjects:
                description: |-
                  allowedSubjects are the permitted identity subjects on imported certificates.
                  If empty, all subjects under the CA are accepted.
                items:
                  type: string
                type: array
              caCert:
                description: |-
                  caCert is the PEM-encoded CA certificate of the remote Flow's trust root.
                  Used for chain verification of imported stamps and packages.
                type: string
              direction:
                description: |-
                  direction is the trust direction: import (this Flow receives from remote)
                  or export (this Flow sends to remote). Bidirectional exchange requires two Treaty CRDs.
                enum:
                - import
                - export
                type: string
              maxBundleSize:
                description: maxBundleSize is the maximum size of export/import bundles.
                type: string
              remoteName:
                description: remoteName is the identifier of the remote Flow.
                minLength: 1
                type: string
